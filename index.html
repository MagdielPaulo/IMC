<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Calculadora de IMC</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">

  <nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm mb-5">
    <div class="container">
      <span class="navbar-brand mb-0 h1">
        <i class="bi bi-activity text-primary"></i> Calculadora de IMC
      </span>
      <button class="btn btn-outline-secondary rounded-circle" id="themeToggle" title="Alternar Tema">
        <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
      </button>
    </div>
  </nav>

  <main class="container flex-grow-1 d-flex align-items-center justify-content-center">
    <div class="card shadow-lg custom-card" style="max-width: 500px; width: 100%;">
      <div class="card-body p-5">
        <h2 class="text-center mb-4 fw-bold">Calcule seu IMC</h2>
        <p class="text-center text-muted mb-4">Descubra seu índice de massa corporal de forma rápida.</p>

        <form action="/" id="formulario" method="POST">
          
          <div class="mb-3">
            <label for="peso" class="form-label fw-semibold">Peso (kg)</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-speedometer"></i></span>
              <input type="number" step="0.01" class="form-control form-control-lg" id="peso" placeholder="Ex: 70.5" name="peso">
            </div>
          </div>

          <div class="mb-4">
            <label for="altura" class="form-label fw-semibold">Altura (m)</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-rulers"></i></span>
              <input type="number" step="0.01" class="form-control form-control-lg" id="altura" placeholder="Ex: 1.75" name="altura">
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm custom-btn">
            <i class="bi bi-calculator me-2"></i> Calcular
          </button>
        </form>

        <div id="resultado" class="mt-4"></div>
      </div>
    </div>
  </main>

  <footer class="text-center py-4 mt-auto bg-body-tertiary">
    <div class="container">
      <p class="mb-0 text-muted">
        &copy; 2026 Desenvolvido por <strong>Magdiel Paulo</strong> Todos os direitos reservados.
      </p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./assets/js/main.js"></script>
</body>

</html>
